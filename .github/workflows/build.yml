name: Build Abyss.

on:
  push:
    branches: [ main, master ]
    tags:     [ 'v*' ]
  pull_request:
    branches: [ main, master ]

jobs:

  # ── Linux ────────────────────────────────────────────────────────────────
  build-linux:
    name: Linux (x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsdl2-dev libsdl2-ttf-dev

      - name: Build
        run: make

      - name: Package
        run: |
          mkdir -p dist
          cp abyss dist/abyss-linux-x86_64
          strip dist/abyss-linux-x86_64

      - uses: actions/upload-artifact@v4
        with:
          name: abyss-linux-x86_64
          path: dist/abyss-linux-x86_64

  # ── Windows (cross-compile via MinGW) ────────────────────────────────────
  build-windows:
    name: Windows (x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install MinGW + SDL2 Windows libs
        run: |
          sudo apt-get update
          sudo apt-get install -y mingw-w64 wget unzip

          # SDL2 mingw dev package
          wget -q https://github.com/libsdl-org/SDL/releases/download/release-2.30.3/SDL2-devel-2.30.3-mingw.tar.gz
          tar xf SDL2-devel-2.30.3-mingw.tar.gz

          # SDL2_ttf mingw dev package
          wget -q https://github.com/libsdl-org/SDL_ttf/releases/download/release-2.22.0/SDL2_ttf-devel-2.22.0-mingw.tar.gz
          tar xf SDL2_ttf-devel-2.22.0-mingw.tar.gz

      - name: Build
        run: |
          SDL2_DIR=SDL2-2.30.3/x86_64-w64-mingw32
          TTF_DIR=SDL2_ttf-2.22.0/x86_64-w64-mingw32

          x86_64-w64-mingw32-g++ \
            -std=c++17 -O2 -Wall \
            -I${SDL2_DIR}/include/SDL2 \
            -I${TTF_DIR}/include/SDL2 \
            src/main.cpp \
            -o abyss.exe \
            -L${SDL2_DIR}/lib -L${TTF_DIR}/lib \
            -lSDL2 -lSDL2_ttf -lm \
            -static-libgcc -static-libstdc++ \
            -mwindows

      - name: Package (copy DLLs)
        run: |
          SDL2_DIR=SDL2-2.30.3/x86_64-w64-mingw32
          TTF_DIR=SDL2_ttf-2.22.0/x86_64-w64-mingw32

          mkdir -p dist
          cp abyss.exe dist/
          # Bundle required DLLs so the exe runs without installation
          cp ${SDL2_DIR}/bin/SDL2.dll        dist/
          cp ${TTF_DIR}/bin/SDL2_ttf.dll     dist/
          # SDL2_ttf depends on these:
          cp ${TTF_DIR}/bin/libfreetype-6.dll  dist/ 2>/dev/null || true
          cp ${TTF_DIR}/bin/zlib1.dll           dist/ 2>/dev/null || true

          cd dist && zip -r ../abyss-windows-x86_64.zip .

      - uses: actions/upload-artifact@v4
        with:
          name: abyss-windows-x86_64
          path: abyss-windows-x86_64.zip

  # ── macOS ────────────────────────────────────────────────────────────────
  build-macos:
    name: macOS (arm64 + x86_64)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install sdl2 sdl2_ttf

      - name: Build
        run: |
          SDL_CFLAGS=$(sdl2-config --cflags)
          SDL_LIBS=$(sdl2-config --libs)
          TTF_LIBS="-lSDL2_ttf"

          g++ -std=c++17 -O2 -Wall \
            $SDL_CFLAGS \
            src/main.cpp \
            -o abyss \
            $SDL_LIBS $TTF_LIBS -lm

      - name: Package
        run: |
          mkdir -p dist
          cp abyss dist/abyss-macos
          strip dist/abyss-macos

      - uses: actions/upload-artifact@v4
        with:
          name: abyss-macos
          path: dist/abyss-macos

  # ── Release (only on version tags) ───────────────────────────────────────
  release:
    name: Publish Release
    needs: [ build-linux, build-windows, build-macos ]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure
        run: ls -R artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Abyss. ${{ github.ref_name }}"
          body: |
            ## Abyss. ${{ github.ref_name }}

            *Stare into the void for 20 minutes. The void stares back.*

            ### Downloads
            | Platform | File |
            |----------|------|
            | 🪟 Windows | `abyss-windows-x86_64.zip` — extract and run `abyss.exe` |
            | 🐧 Linux   | `abyss-linux-x86_64` — `chmod +x` then run |
            | 🍎 macOS   | `abyss-macos` — `chmod +x` then run |

            ### Requirements
            - Windows: all DLLs bundled in the zip, no install needed
            - Linux: needs `libsdl2` and `libsdl2-ttf` (`sudo apt install libsdl2-2.0-0 libsdl2-ttf-2.0-0`)
            - macOS: needs SDL2 (`brew install sdl2 sdl2_ttf`)
          files: |
            artifacts/abyss-windows-x86_64/abyss-windows-x86_64.zip
            artifacts/abyss-linux-x86_64/abyss-linux-x86_64
            artifacts/abyss-macos/abyss-macos
          draft: false
          prerelease: false
