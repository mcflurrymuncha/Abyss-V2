name: Build Abyss

on:
  push:
    branches: [ main, master ]
    tags:      [ 'v*' ]
  pull_request:
    branches: [ main, master ]

jobs:
  # ── Windows (cross-compile via MinGW) ────────────────────────────────────
  build-windows:
    name: Windows (x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install MinGW + SDL2 Windows libs
        run: |
          sudo apt-get update
          sudo apt-get install -y mingw-w64 wget unzip
          
          # SDL2
          wget -q https://github.com/libsdl-org/SDL/releases/download/release-2.30.3/SDL2-devel-2.30.3-mingw.tar.gz
          tar -xzf SDL2-devel-2.30.3-mingw.tar.gz
          
          # SDL2_ttf
          wget -q https://github.com/libsdl-org/SDL_ttf/releases/download/release-2.22.0/SDL2_ttf-devel-2.22.0-mingw.tar.gz
          tar -xzf SDL2_ttf-devel-2.22.0-mingw.tar.gz

      - name: Build
        run: |
          # Use absolute paths to ensure the compiler finds the headers
          export SDL2_PATH=$GITHUB_WORKSPACE/SDL2-2.30.3/x86_64-w64-mingw32
          export TTF_PATH=$GITHUB_WORKSPACE/SDL2_ttf-2.22.0/x86_64-w64-mingw32
          
          x86_64-w64-mingw32-g++ -std=c++17 -O2 -Wall \
            -I${SDL2_PATH}/include \
            -I${TTF_PATH}/include \
            src/main.cpp \
            -o abyss.exe \
            -L${SDL2_PATH}/lib \
            -L${TTF_PATH}/lib \
            -lmingw32 -lSDL2main -lSDL2 -lSDL2_ttf -lm \
            -static-libgcc -static-libstdc++ \
            -mwindows

      - name: Package (copy DLLs)
        run: |
          SDL2_DIR=SDL2-2.30.3/x86_64-w64-mingw32
          TTF_DIR=SDL2_ttf-2.22.0/x86_64-w64-mingw32
          
          mkdir -p dist
          cp abyss.exe dist/
          cp ${SDL2_DIR}/bin/SDL2.dll      dist/
          cp ${TTF_DIR}/bin/SDL2_ttf.dll   dist/
          # Copy dependencies if they exist
          cp ${TTF_DIR}/bin/libfreetype-6.dll  dist/ 2>/dev/null || true
          cp ${TTF_DIR}/bin/zlib1.dll           dist/ 2>/dev/null || true
          
          cd dist && zip -r ../abyss-windows-x86_64.zip .

      - uses: actions/upload-artifact@v4
        with:
          name: abyss-windows-x86_64
          path: abyss-windows-x86_64.zip

  # ── Release (only on version tags) ───────────────────────────────────────
  release:
    name: Publish Release
    needs: [ build-windows ]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Abyss. ${{ github.ref_name }}"
          body: |
            ## Abyss. ${{ github.ref_name }}

            *Stare into the void for 20 minutes. The void stares back.*

            ### Downloads
            | Platform | File |
            |----------|------|
            | 🪟 Windows | `abyss-windows-x86_64.zip` — extract and run `abyss.exe` |

            ### Requirements
            - Windows: all DLLs bundled in the zip, no install needed
          files: |
            artifacts/abyss-windows-x86_64/abyss-windows-x86_64.zip
          draft: false
          prerelease: false
